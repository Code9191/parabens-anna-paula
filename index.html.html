<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Feliz Aniversário, Anna Paula 💙</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700&display=swap');

:root{--pink:#ff7eb3;--rose:#ff3d8b;--gold:#ffd76e;--blue:#5dade2}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1028;min-height:100vh;min-height:100dvh;overflow:hidden;display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif}
.scene{position:relative;width:100vw;height:100vh;height:100dvh;overflow:hidden}

/* ═══ ROOM ═══ */
.wall{position:absolute;top:0;left:0;right:0;height:62%;background:linear-gradient(180deg,#2a1f3d,#352850 50%,#3d2f5c)}
.wall::after{content:'';position:absolute;bottom:0;left:0;right:0;height:25%;background:linear-gradient(180deg,#3d2f5c,#4a3868);border-top:3px solid #5a4580}
.floor{position:absolute;bottom:0;left:0;right:0;height:38%;background:linear-gradient(180deg,#5c4033,#4a3228 30%,#3d2820)}
.floor::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 18%,rgba(0,0,0,.08) 18%,rgba(0,0,0,.08) 18.5%)}

/* ═══ WINDOW ═══ */
.window{position:absolute;top:6%;right:8%;width:clamp(80px,18vw,140px);height:clamp(100px,22vh,170px);background:linear-gradient(180deg,#0a0618,#141040 60%,#1a1555);border:4px solid #6b5a8a;border-radius:4px 4px 2px 2px;box-shadow:inset 0 0 20px rgba(93,173,226,.1),0 0 15px rgba(0,0,0,.4);overflow:hidden}
.window-cross-h{position:absolute;top:48%;left:0;right:0;height:4px;background:#6b5a8a;z-index:2}
.window-cross-v{position:absolute;top:0;bottom:0;left:48%;width:4px;background:#6b5a8a;z-index:2}
.window .wstar{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:wtwinkle var(--d) ease-in-out infinite alternate}
@keyframes wtwinkle{0%{opacity:.2}100%{opacity:1}}
.window-moon{position:absolute;top:15%;left:18%;width:18px;height:18px;background:radial-gradient(circle at 40% 40%,#fffde8,#f5f0c0);border-radius:50%;box-shadow:0 0 12px rgba(255,253,230,.4)}

/* firework in window */
.fw-burst{position:absolute;border-radius:50%;pointer-events:none}

/* ═══ BUNTING ═══ */
.bunting{position:absolute;top:8%;left:5%;right:5%;height:40px;z-index:3}
.bunting svg{width:100%;height:100%}

/* ═══ BANNER ═══ */
.party-banner{position:absolute;top:clamp(50px,14%,90px);left:50%;transform:translateX(-50%);background:var(--blue);padding:6px clamp(14px,4vw,28px);border-radius:4px;box-shadow:0 3px 15px rgba(93,173,226,.3);z-index:3;animation:bsway 4s ease-in-out infinite alternate}
.party-banner::before,.party-banner::after{content:'';position:absolute;top:-12px;width:2px;height:14px;background:#888}
.party-banner::before{left:15%}.party-banner::after{right:15%}
@keyframes bsway{0%{transform:translateX(-50%) rotate(-1deg)}100%{transform:translateX(-50%) rotate(1deg)}}
.party-banner span{font-family:'Pacifico',cursive;font-size:clamp(12px,3.5vw,22px);color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.3);letter-spacing:1px}

/* ═══ BALLOONS ═══ */
.balloon{position:absolute;z-index:2;animation:bfloat var(--d) ease-in-out infinite alternate}
.balloon::after{content:'';position:absolute;bottom:-20px;left:50%;width:1px;height:20px;background:rgba(200,200,200,.4);transform:translateX(-50%)}
@keyframes bfloat{0%{transform:translateY(0) rotate(-3deg)}100%{transform:translateY(-8px) rotate(3deg)}}

/* ═══ TABLE + ILLUSTRATION WRAPPER ═══ */
.table-scene{
  position:absolute;
  bottom:clamp(12%,18%,22%);
  left:50%;transform:translateX(-50%);
  width:clamp(280px,75vw,480px);
  z-index:5;
}
/* the SVG sits on top of the table */
.illustration{
  display:block;
  width:100%;
  margin-bottom:-4px; /* overlap table edge slightly */
  filter:drop-shadow(0 5px 15px rgba(0,0,0,.25));
  position:relative;z-index:6;
}

/* table structure under the SVG */
.table-top{
  width:100%;height:8px;
  background:linear-gradient(180deg,#a07050,#8d6040);
  border-radius:3px 3px 0 0;
  position:relative;z-index:4;
}
.tablecloth{
  width:104%;margin-left:-2%;height:10px;
  background:linear-gradient(180deg,#e8b8cc,#d4a0b8);
  border-radius:3px 3px 0 0;
  position:relative;z-index:5;
}
.tablecloth::after{
  content:'';position:absolute;bottom:-8px;left:0;right:0;height:10px;
  background:radial-gradient(circle at 8px 0,transparent 7px,#d4a0b8 7px,#d4a0b8 9px,transparent 9px);
  background-size:16px 10px;
}
.table-front{
  width:98%;height:clamp(40px,10vh,75px);
  background:linear-gradient(180deg,#7a5035,#694530);
  margin:0 auto;border-radius:0 0 3px 3px;
  box-shadow:0 4px 15px rgba(0,0,0,.3);position:relative;
}
.table-front::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 12px,rgba(0,0,0,.04) 12px,rgba(0,0,0,.04) 13px);border-radius:0 0 3px 3px}
.table-legs{display:flex;justify-content:space-between;padding:0 6%}
.table-legs div{width:8px;height:clamp(20px,6vh,45px);background:linear-gradient(90deg,#6b4530,#5a3a28);border-radius:0 0 2px 2px}
/* cloth drape triangles */
.drape{position:absolute;top:0;left:0;right:0;height:100%;overflow:hidden;z-index:1}

/* ═══ ANIMATIONS ═══ */
.flame{animation:flicker 1.2s ease-in-out infinite alternate;transform-origin:bottom center}
@keyframes flicker{0%{opacity:.88}50%{opacity:1}100%{opacity:.85}}
.flame-glow{animation:fglow 1.5s ease-in-out infinite alternate}
@keyframes fglow{0%{opacity:.1}100%{opacity:.25}}

.paw-l{animation:clap-l .55s ease-in-out infinite;transform-origin:78px 182px}
.paw-r{animation:clap-r .55s ease-in-out infinite;transform-origin:122px 182px}
@keyframes clap-l{0%,100%{transform:rotate(12deg)}50%{transform:rotate(-4deg) translateX(2px)}}
@keyframes clap-r{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(4deg) translateX(-2px)}}

.cat-eyes{animation:blinky 3.5s ease-in-out infinite}
@keyframes blinky{0%,92%,100%{transform:scaleY(1)}96%{transform:scaleY(.08)}}

.mouth-sing{animation:singy .45s ease-in-out infinite;transform-origin:100px 155px}
@keyframes singy{0%,100%{transform:scaleY(1) scaleX(1)}50%{transform:scaleY(1.3) scaleX(1.1)}}

.cat-tail{animation:tail 2.5s ease-in-out infinite alternate;transform-origin:75% 97%}
@keyframes tail{0%{transform:rotate(-2deg)}100%{transform:rotate(3deg)}}

.cat-body-group{animation:bounce-cat .55s ease-in-out infinite;transform-origin:100px 195px}
@keyframes bounce-cat{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}

/* ═══ MUSIC NOTES ═══ */
.notes-layer{position:absolute;inset:0;pointer-events:none;z-index:7;overflow:hidden}
.note{position:absolute;opacity:0;font-size:clamp(14px,3.5vw,20px);animation:note-up var(--d) ease-out infinite;animation-delay:var(--dl)}
@keyframes note-up{0%{opacity:0;transform:translateY(0) scale(.5)}10%{opacity:1}80%{opacity:.6}100%{opacity:0;transform:translateY(-180px) rotate(15deg) scale(1)}}

/* ═══ KARAOKE ═══ */
.karaoke{
  position:absolute;bottom:clamp(25px,6%,55px);left:50%;transform:translateX(-50%);
  z-index:8;width:90%;text-align:center;
  font-weight:700;font-size:clamp(13px,3.8vw,20px);
  color:rgba(255,255,255,.3);min-height:2em;letter-spacing:.5px;
}
.karaoke .lit{color:#fff;text-shadow:0 0 10px rgba(255,126,179,.6)}
.karaoke .bright{color:var(--gold);text-shadow:0 0 14px rgba(255,215,110,.7)}

/* ═══ FINAL MESSAGE — same scene, below table ═══ */
.final-msg{
  position:absolute;
  bottom:clamp(15px,4%,45px);
  left:50%;transform:translateX(-50%);
  z-index:8;text-align:center;width:90%;
  opacity:0;transition:opacity 2s ease;pointer-events:none;
}
.final-msg.show{opacity:1}
.final-msg h1{
  font-family:'Pacifico',cursive;
  font-size:clamp(1.6rem,6vw,3rem);
  color:var(--pink);
  text-shadow:0 0 30px rgba(255,126,179,.35),0 2px 0 rgba(255,61,139,.2);
  margin-bottom:6px;
}
.final-msg p{font-size:clamp(.8rem,3vw,1.15rem);color:rgba(255,255,255,.85);line-height:1.8}
.final-msg .heart{display:inline-block;color:var(--blue);font-size:1.3em;animation:hbeat 1s ease-in-out infinite}
@keyframes hbeat{0%,100%{transform:scale(1)}15%{transform:scale(1.3)}30%{transform:scale(1)}45%{transform:scale(1.15)}}

/* ═══ CONFETTI ═══ */
.confetti-layer{position:absolute;inset:0;pointer-events:none;z-index:12;overflow:hidden}
.conf{position:absolute;top:-10px;opacity:0;animation:conf-fall var(--f) linear forwards;animation-delay:var(--d)}
@keyframes conf-fall{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:.5;transform:translateY(110vh) rotate(800deg)}}

.sparkle{position:fixed;width:5px;height:5px;border-radius:50%;pointer-events:none;z-index:20;animation:spark .6s ease-out forwards}
@keyframes spark{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}
</style>
</head>
<body>
<div class="scene">
  <div class="wall"></div>
  <div class="floor"></div>

  <div class="window" id="windowEl">
    <div class="window-moon"></div>
    <div class="window-cross-h"></div>
    <div class="window-cross-v"></div>
  </div>

  <!-- BUNTING -->
  <svg class="bunting" viewBox="0 0 400 40" preserveAspectRatio="none">
    <path d="M0,8 Q50,5 100,8 Q150,5 200,8 Q250,5 300,8 Q350,5 400,8" stroke="#888" stroke-width="1" fill="none"/>
    <polygon points="40,8 55,35 25,35" fill="#ff7eb3" opacity=".8"/>
    <polygon points="80,8 95,32 65,32" fill="#5dade2" opacity=".8"/>
    <polygon points="120,8 135,35 105,35" fill="#ffd76e" opacity=".8"/>
    <polygon points="160,8 175,32 145,32" fill="#2ecc71" opacity=".8"/>
    <polygon points="200,8 215,35 185,35" fill="#bb8fce" opacity=".8"/>
    <polygon points="240,8 255,32 225,32" fill="#ff7eb3" opacity=".8"/>
    <polygon points="280,8 295,35 265,35" fill="#5dade2" opacity=".8"/>
    <polygon points="320,8 335,32 305,32" fill="#ffd76e" opacity=".8"/>
    <polygon points="360,8 375,35 345,35" fill="#2ecc71" opacity=".8"/>
  </svg>

  <div class="party-banner"><span>Parabéns, Anna Paula!</span></div>

  <!-- BALLOONS -->
  <div class="balloon" style="left:6%;top:15%;--d:3.5s">
    <svg width="36" height="44" viewBox="0 0 36 44"><ellipse cx="18" cy="20" rx="16" ry="20" fill="#ff7eb3" opacity=".85"/><ellipse cx="14" cy="14" rx="4" ry="6" fill="#ffa0c8" opacity=".5"/><polygon points="16,40 18,44 20,40" fill="#ff7eb3"/></svg>
  </div>
  <div class="balloon" style="left:82%;top:12%;--d:4s">
    <svg width="34" height="42" viewBox="0 0 34 42"><ellipse cx="17" cy="19" rx="15" ry="19" fill="#5dade2" opacity=".85"/><ellipse cx="13" cy="13" rx="4" ry="5" fill="#8ec8e8" opacity=".5"/><polygon points="15,38 17,42 19,38" fill="#5dade2"/></svg>
  </div>
  <div class="balloon" style="left:18%;top:20%;--d:3s">
    <svg width="30" height="38" viewBox="0 0 30 38"><ellipse cx="15" cy="17" rx="13" ry="17" fill="#ffd76e" opacity=".85"/><ellipse cx="12" cy="12" rx="3" ry="5" fill="#ffe8a0" opacity=".5"/><polygon points="13,34 15,38 17,34" fill="#ffd76e"/></svg>
  </div>
  <div class="balloon" style="right:16%;top:22%;--d:3.8s">
    <svg width="32" height="40" viewBox="0 0 32 40"><ellipse cx="16" cy="18" rx="14" ry="18" fill="#bb8fce" opacity=".85"/><ellipse cx="12" cy="12" rx="3" ry="5" fill="#d4b0e0" opacity=".5"/><polygon points="14,36 16,40 18,36" fill="#bb8fce"/></svg>
  </div>

  <!-- ═══ TABLE + STUFF ON TOP ═══ -->
  <div class="table-scene">

    <!-- SVG: everything ON the table surface -->
    <svg class="illustration" viewBox="0 0 340 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="cakeShade1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(0,0,0,0)"/><stop offset="100%" stop-color="rgba(0,0,0,.12)"/></linearGradient>
        <linearGradient id="cakeShade2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(0,0,0,0)"/><stop offset="100%" stop-color="rgba(0,0,0,.1)"/></linearGradient>
        <radialGradient id="eyeGrad" cx="45%" cy="40%"><stop offset="0%" stop-color="#55efc4" stop-opacity=".35"/><stop offset="100%" stop-color="#2ecc71" stop-opacity="0"/></radialGradient>
      </defs>

      <!-- ── CUPCAKE LEFT ── -->
      <g transform="translate(18,155)">
        <!-- wrapper -->
        <path d="M-10,10 L-8,30 L12,30 L14,10 Z" fill="#e8a0b8" stroke="#d48aa0" stroke-width=".5"/>
        <path d="M-10,10 L-8,30 L12,30 L14,10 Z" fill="url(#cakeShade1)"/>
        <!-- wrapper lines -->
        <line x1="-6" y1="12" x2="-5" y2="29" stroke="#d48aa0" stroke-width=".4" opacity=".4"/>
        <line x1="0" y1="10" x2="1" y2="29" stroke="#d48aa0" stroke-width=".4" opacity=".4"/>
        <line x1="6" y1="10" x2="7" y2="29" stroke="#d48aa0" stroke-width=".4" opacity=".4"/>
        <!-- frosting swirl -->
        <ellipse cx="2" cy="8" rx="14" ry="7" fill="#ffc4d6"/>
        <ellipse cx="2" cy="5" rx="11" ry="6" fill="#ffd6e4"/>
        <ellipse cx="2" cy="2" rx="8" ry="5" fill="#ffe8f0"/>
        <ellipse cx="2" cy="0" rx="5" ry="3.5" fill="#fff5f8"/>
        <!-- cherry on top -->
        <circle cx="2" cy="-4" r="3.5" fill="#e74c3c"/>
        <circle cx="1" cy="-5.5" r="1" fill="#ff8888" opacity=".6"/>
      </g>

      <!-- ── CUPCAKE RIGHT ── -->
      <g transform="translate(298,158)">
        <path d="M-9,8 L-7,26 L11,26 L13,8 Z" fill="#b8d4f0" stroke="#a0bcd8" stroke-width=".5"/>
        <line x1="-4" y1="9" x2="-3" y2="25" stroke="#a0bcd8" stroke-width=".4" opacity=".4"/>
        <line x1="2" y1="8" x2="3" y2="25" stroke="#a0bcd8" stroke-width=".4" opacity=".4"/>
        <line x1="7" y1="9" x2="8" y2="25" stroke="#a0bcd8" stroke-width=".4" opacity=".4"/>
        <ellipse cx="2" cy="6" rx="13" ry="6" fill="#a8d8ea"/>
        <ellipse cx="2" cy="3" rx="10" ry="5" fill="#c0e8f5"/>
        <ellipse cx="2" cy="0" rx="7" ry="4" fill="#daf0fa"/>
        <ellipse cx="2" cy="-2" rx="4" ry="3" fill="#eef8ff"/>
        <!-- sprinkles -->
        <rect x="-4" y="2" width="2" height="1" rx=".5" fill="#ff7eb3" transform="rotate(-20,-3,2.5)"/>
        <rect x="3" y="0" width="2" height="1" rx=".5" fill="#ffd76e" transform="rotate(15,4,.5)"/>
        <rect x="7" y="3" width="2" height="1" rx=".5" fill="#2ecc71" transform="rotate(-30,8,3.5)"/>
        <rect x="-1" y="-1" width="2" height="1" rx=".5" fill="#5dade2" transform="rotate(25,0,-.5)"/>
      </g>

      <!-- ── JUICE CUP LEFT ── -->
      <g transform="translate(52,148)">
        <!-- glass -->
        <path d="M-6,8 L-4,36 L12,36 L14,8 Z" fill="rgba(255,180,200,0.25)" stroke="rgba(255,255,255,0.3)" stroke-width=".8"/>
        <!-- juice -->
        <path d="M-5,14 L-4,35 L12,35 L13,14 Z" fill="#ff9fbb" opacity=".5"/>
        <!-- straw -->
        <rect x="6" y="-2" width="2" height="38" rx="1" fill="#ff7eb3" opacity=".7" transform="rotate(5,7,18)"/>
        <!-- rim highlight -->
        <ellipse cx="4" cy="8" rx="10" ry="2.5" fill="rgba(255,255,255,.15)"/>
      </g>

      <!-- ── BRIGADEIROS PLATE (right side) ── -->
      <g transform="translate(268,172)">
        <!-- small plate -->
        <ellipse cx="0" cy="10" rx="20" ry="4" fill="#f0e6d0" opacity=".7"/>
        <ellipse cx="0" cy="9" rx="18" ry="3.5" fill="#f5edd8"/>
        <!-- brigadeiros (chocolate balls) -->
        <circle cx="-8" cy="6" r="4" fill="#4a2c17"/>
        <circle cx="-8" cy="6" r="4" fill="url(#cakeShade1)"/>
        <circle cx="-8" cy="4.5" r="1.2" fill="rgba(255,255,255,.15)"/>
        <circle cx="0" cy="5" r="4" fill="#4a2c17"/>
        <circle cx="0" cy="3.5" r="1.2" fill="rgba(255,255,255,.15)"/>
        <circle cx="8" cy="6" r="4" fill="#4a2c17"/>
        <circle cx="8" cy="4.5" r="1.2" fill="rgba(255,255,255,.15)"/>
        <!-- sprinkles on brigadeiros -->
        <circle cx="-10" cy="5" r=".8" fill="#ff7eb3"/><circle cx="-7" cy="3" r=".8" fill="#ffd76e"/>
        <circle cx="-6" cy="7" r=".8" fill="#2ecc71"/>
        <circle cx="2" cy="3.5" r=".8" fill="#ff7eb3"/><circle cx="-2" cy="6" r=".8" fill="#5dade2"/>
        <circle cx="6" cy="4" r=".8" fill="#ffd76e"/><circle cx="10" cy="5.5" r=".8" fill="#ff7eb3"/>
        <circle cx="7" cy="8" r=".8" fill="#2ecc71"/>
      </g>

      <!-- ── CAKE (center) ── -->
      <g>
        <!-- plate -->
        <ellipse cx="170" cy="192" rx="42" ry="6" fill="#f0e6d0" opacity=".85"/>
        <ellipse cx="170" cy="190" rx="40" ry="5" fill="#f5edd8"/>
        <!-- bottom tier -->
        <rect x="135" y="152" width="70" height="40" rx="5" fill="#d4567a"/>
        <rect x="135" y="152" width="70" height="40" rx="5" fill="url(#cakeShade1)"/>
        <rect x="133" y="150" width="74" height="8" rx="4" fill="#fff0f5"/>
        <ellipse cx="142" cy="160" rx="3.5" ry="4" fill="#fff0f5"/>
        <ellipse cx="156" cy="162" rx="3" ry="5" fill="#fff0f5"/>
        <ellipse cx="170" cy="161" rx="3.5" ry="4.5" fill="#fff0f5"/>
        <ellipse cx="184" cy="163" rx="3" ry="5" fill="#fff0f5"/>
        <ellipse cx="198" cy="160" rx="3" ry="4" fill="#fff0f5"/>
        <!-- cherries bottom -->
        <circle cx="144" cy="172" r="2.5" fill="#e74c3c"/><circle cx="158" cy="174" r="2" fill="#ff7eb3"/>
        <circle cx="170" cy="173" r="2.5" fill="#e74c3c"/><circle cx="182" cy="174" r="2" fill="#ff7eb3"/>
        <circle cx="196" cy="172" r="2.5" fill="#e74c3c"/>
        <!-- top tier -->
        <rect x="148" y="118" width="44" height="34" rx="5" fill="#e87a9e"/>
        <rect x="148" y="118" width="44" height="34" rx="5" fill="url(#cakeShade2)"/>
        <rect x="146" y="116" width="48" height="7" rx="3.5" fill="#fff5f8"/>
        <ellipse cx="154" cy="126" rx="2.5" ry="3.5" fill="#fff5f8"/>
        <ellipse cx="170" cy="127" rx="2.5" ry="4" fill="#fff5f8"/>
        <ellipse cx="186" cy="125" rx="2.5" ry="3" fill="#fff5f8"/>
        <circle cx="156" cy="136" r="2" fill="#ffd76e"/><circle cx="170" cy="137" r="2.5" fill="#ffd76e"/><circle cx="184" cy="136" r="2" fill="#ffd76e"/>
        <!-- candles -->
        <rect x="158" y="96" width="3" height="21" rx="1.5" fill="#ffeedd"/>
        <rect x="168.5" y="92" width="3" height="25" rx="1.5" fill="#ffe0e8"/>
        <rect x="179" y="96" width="3" height="21" rx="1.5" fill="#ffeedd"/>
        <!-- flames -->
        <g class="flame">
          <ellipse cx="159.5" cy="93" rx="4" ry="5.5" fill="#ffe066"/>
          <ellipse cx="159.5" cy="92" rx="2.2" ry="3.5" fill="#fffacc"/>
          <ellipse cx="159.5" cy="93" rx="9" ry="9" fill="#ffe066" opacity=".12" class="flame-glow"/>
        </g>
        <g class="flame" style="animation-delay:.4s">
          <ellipse cx="170" cy="89" rx="4.5" ry="6" fill="#ffb347"/>
          <ellipse cx="170" cy="88" rx="2.5" ry="3.8" fill="#ffe066"/>
          <ellipse cx="170" cy="89" rx="10" ry="10" fill="#ffb347" opacity=".12" class="flame-glow"/>
        </g>
        <g class="flame" style="animation-delay:.2s">
          <ellipse cx="180.5" cy="93" rx="4" ry="5.5" fill="#ffe066"/>
          <ellipse cx="180.5" cy="92" rx="2.2" ry="3.5" fill="#fffacc"/>
          <ellipse cx="180.5" cy="93" rx="9" ry="9" fill="#ffe066" opacity=".12" class="flame-glow"/>
        </g>
      </g>

      <!-- ══ CAT ══ -->
      <g class="cat-body-group">
        <!-- TAIL -->
        <g class="cat-tail">

<script>
// ── Window stars ──
const wEl=document.getElementById('windowEl');
for(let i=0;i<15;i++){const s=document.createElement('div');s.className='wstar';s.style.cssText=`left:${5+Math.random()*88}%;top:${5+Math.random()*85}%;--d:${1.5+Math.random()*3}s;animation-delay:${Math.random()*3}s`;wEl.appendChild(s);}

// ── Fireworks in window ──
function windowFirework(){
  const colors=['#ff7eb3','#5dade2','#ffd76e','#2ecc71','#fff','#bb8fce'];
  const x=10+Math.random()*80,y=10+Math.random()*60;
  for(let i=0;i<8;i++){
    const p=document.createElement('div');p.className='fw-burst';
    const sz=3+Math.random()*5,c=colors[Math.floor(Math.random()*6)];
    const angle=(Math.PI*2/8)*i,dist=8+Math.random()*18;
    p.style.cssText=`left:${x}%;top:${y}%;width:${sz}px;height:${sz}px;background:${c};box-shadow:0 0 ${sz}px ${c};opacity:1`;
    wEl.appendChild(p);
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      p.style.transition='all .8s ease-out';
      p.style.transform=`translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px) scale(0)`;
      p.style.opacity='0';
    }));
    setTimeout(()=>p.remove(),1200);
  }
}
setInterval(windowFirework,2200);setTimeout(windowFirework,800);

// ── Music notes ──
const notesLayer=document.getElementById('notesLayer');
const noteC=['♪','♫','♬','♩'],noteColors=['#ff7eb3','#ffd76e','#5dade2','#ffc4d6','#2ecc71'];
let notesOn=false;
function spawnNote(){
  if(!notesOn)return;
  const n=document.createElement('div');n.className='note';
  n.textContent=noteC[Math.floor(Math.random()*4)];
  n.style.color=noteColors[Math.floor(Math.random()*5)];
  n.style.left=(20+Math.random()*60)+'%';n.style.top=(30+Math.random()*25)+'%';
  n.style.setProperty('--d',(2.5+Math.random()*2)+'s');n.style.setProperty('--dl','0s');
  notesLayer.appendChild(n);setTimeout(()=>n.remove(),5000);
}

// ── Karaoke ──
const lyrics=[{text:"Parabéns pra você",dur:2800},{text:"Nesta data querida",dur:2800},{text:"Muitas felicidades",dur:2800},{text:"Muitos anos de vida!",dur:3200}];
const karEl=document.getElementById('karaoke');
let li=0;
function playLine(){
  if(li>=lyrics.length){karEl.style.display='none';notesOn=false;setTimeout(showFinal,800);return;}
  const l=lyrics[li],words=l.text.split(' ');
  karEl.innerHTML=words.map(w=>`<span>${w}</span>`).join(' ');
  const spans=[...karEl.querySelectorAll('span')];
  let wi=0;const interval=l.dur/(words.length+1);
  function tick(){
    if(wi>=words.length){li++;setTimeout(playLine,300);return;}
    spans.forEach((s,i)=>{s.className=i<wi?'lit':i===wi?'bright':'';});
    wi++;setTimeout(tick,interval);
  }
  tick();
}

function showFinal(){document.getElementById('finalMsg').classList.add('show');spawnConfetti();}

function spawnConfetti(){
  const layer=document.getElementById('confLayer');
  const colors=['#ff7eb3','#5dade2','#ffd76e','#2ecc71','#bb8fce','#ff9f43','#fff','#ff3d8b'];
  for(let i=0;i<80;i++){
    const c=document.createElement('div');c.className='conf';
    const w=3+Math.random()*6,h=3+Math.random()*8;
    c.style.cssText=`left:${Math.random()*100}%;width:${w}px;height:${h}px;background:${colors[Math.floor(Math.random()*8)]};border-radius:${Math.random()>.5?'50%':'1px'};--f:${3+Math.random()*4}s;--d:${Math.random()*3}s`;
    layer.appendChild(c);
  }
}

// ── Sparkle on tap ──
document.addEventListener('click',e=>{
  const colors=['#ff7eb3','#ffd76e','#5dade2','#fff','#2ecc71'];
  for(let i=0;i<8;i++){
    const s=document.createElement('div');s.className='sparkle';
    const angle=(Math.PI*2/8)*i,dist=20+Math.random()*35;
    s.style.cssText=`left:${e.clientX}px;top:${e.clientY}px;background:${colors[Math.floor(Math.random()*5)]};--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px`;
    document.body.appendChild(s);setTimeout(()=>s.remove(),600);
  }
});

// ── START ──
setTimeout(()=>{notesOn=true;setInterval(spawnNote,550);playLine();},1800);
</script>
